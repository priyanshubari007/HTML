<!DOCTYPE html>
<html>
    <head>
        <title>Audio and Video</title>
    </head>
    <body>
        <h2>This is one of my favourite songs</h2>
        <audio controls autoplay>
            <source src="sample-9s.mp3" type="audio/mpeg">
            Your browser does not support the audio tag
        
        </audio>


        <p>This is my favourite video</p>
        <video width="400px" height="300px" controls autoplay poster loop>
            <source src="sample-2.mp4" type="video/mp4">
            Your browser does not support the video tag
        </video>
    </body>
</html>
